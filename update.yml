name: Atualizar dados dos jogos

on:
  schedule:
    # Roda todo dia às 08:00 (horário de Brasília = UTC-3) -> 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch: {}  # permite rodar manualmente pelo botão "Run workflow" no GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Buscar dados dos jogos
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: python fetch_data.py

      - name: Commitar data.json atualizado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Atualiza jogos do dia"
          git push
